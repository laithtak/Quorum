name: Feature Request
description: Suggest an idea for Quorum
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're trying to solve and how Quorum could help.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation or pain point does this address?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like Quorum to behave?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Python SDK
        - Providers
        - Persona packs
        - Synthesis
        - Web UI
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this feature
          required: false
