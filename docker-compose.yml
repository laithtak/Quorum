services:
  api:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./web/frontend:/app
    depends_on:
      - api
